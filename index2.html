<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="3; url=https://pawank2611.vercel.app/" />
    <link rel="canonical" href="https://pawank2611.vercel.app/" />
    <title>Pawan Kumar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=Inter:wght@300;400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: #0D0D0D;
        color: #F0EBE3;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 0;
      }

      .container {
        text-align: center;
        padding: 2rem;
        animation: fadeUp 0.8s cubic-bezier(0.4,0,0.2,1) both;
      }

      .eyebrow {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.72rem;
        color: #C9A84C;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .eyebrow::before, .eyebrow::after {
        content: '';
        display: inline-block;
        width: 2rem;
        height: 1px;
        background: #C9A84C;
      }

      h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: clamp(3rem, 8vw, 5.5rem);
        font-weight: 900;
        line-height: 1.0;
        letter-spacing: -0.02em;
        margin-bottom: 1.5rem;
      }

      h1 em {
        font-style: italic;
        color: #C9A84C;
      }

      .message {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.78rem;
        color: #555550;
        letter-spacing: 0.08em;
        margin-bottom: 2.5rem;
      }

      .message span {
        color: #C9A84C;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #C9A84C;
        color: #0D0D0D;
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 0.85rem 2.2rem;
        border-radius: 4px;
        text-decoration: none;
        letter-spacing: 0.03em;
        transition: background 0.2s, transform 0.2s;
        margin-bottom: 3rem;
      }

      .btn:hover {
        background: #d9b85c;
        transform: translateY(-2px);
      }

      .terminal {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        background: #141414;
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 6px;
        padding: 0.75rem 1.25rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.75rem;
        color: #888880;
      }

      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #C9A84C;
        animation: pulse 2s ease-in-out infinite;
        flex-shrink: 0;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
    <script>setTimeout(() => window.location.replace("https://pawank2611.vercel.app/"), 3000)</script>
  </head>
  <body>
    <div class="container">
      <p class="eyebrow">Redirecting</p>
      <h1>Pawan<br /><em>Kumar.</em></h1>
      <p class="message">Portfolio has moved &nbsp;·&nbsp; <span>pawank2611.vercel.app</span></p>
      <a href="https://pawank2611.vercel.app/" class="btn">Take Me There →</a>
      <br />
      <div class="terminal">
        <span class="dot"></span>
        <span>$ redirect &nbsp; <span style="color:#F0EBE3">pawank2611.vercel.app</span></span>
      </div>
    </div>
  </body>
</html>
